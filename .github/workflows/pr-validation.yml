name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  secret-scan:
    name: "[D1] Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.11"

      - run: |
          pip install detect-secrets==1.4.0
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline

  sca-pip-audit:
    name: "[D1] SCA — pip-audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.11"

      - run: |
          pip install pip-audit==2.7.3
          pip-audit --requirement requirements.txt \
            --format json --output pip-audit-report.json
          pip-audit --requirement requirements.txt

      - uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f7
        if: always()
        with:
          name: sca-report
          path: pip-audit-report.json
          retention-days: 7